<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="1020" style="font-family:Noto Sans KR, Apple SD Gothic Neo, sans-serif;" version="1.1" viewBox="0 0 1600 1020" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerWidth="10" markerHeight="10" orient="auto" refX="10" refY="5" markerUnits="userSpaceOnUse"><polyline points="0,1 9,5 0,9" fill="none" stroke="#bb5a21" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></marker></defs><rect fill="#fbf7f0" height="100%" width="100%" x="0" y="0" /><rect fill="#fffdfa" height="912" rx="34" ry="34" stroke="#d9cfbf" stroke-width="2" width="1492" x="54" y="52" /><text fill="#bb5a21" font-size="22" font-weight="800" x="94" y="104">핵심 구조</text><text fill="#121316" font-size="46" font-weight="800" x="94" y="156">NL2SQL 5단계</text><text fill="#5b6169" font-size="19" font-weight="500" x="94" y="202">자연어 질의를 단계별로 검증하고 SQL로 변환하는 파이프라인</text><!-- Card 1: 해석 (Parse) --><rect fill="#efe1d4" height="230" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="244" x="100" y="300" /><text fill="#121316" font-size="30" font-weight="800" x="126" y="346">해석 (Parse)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="126" x2="318" y1="362" y2="362" /><text fill="#5b6169" font-size="19" font-weight="500" x="126" y="396">LLMParser</text><text fill="#5b6169" font-size="19" font-weight="500" x="126" y="426">2단계 추론</text><text fill="#5b6169" font-size="19" font-weight="500" x="126" y="456">entity · table_type</text><text fill="#5b6169" font-size="19" font-weight="500" x="126" y="486">intent 식별</text><text fill="#5b6169" font-size="19" font-weight="500" x="126" y="516">KeywordParser 폴백</text><!-- Card 2: 확인 (Validate) --><rect fill="#fffdfa" height="230" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="244" x="384" y="300" /><text fill="#121316" font-size="30" font-weight="800" x="410" y="346">확인 (Validate)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="410" x2="602" y1="362" y2="362" /><text fill="#5b6169" font-size="19" font-weight="500" x="410" y="396">화이트리스트 컬럼 검증</text><text fill="#5b6169" font-size="19" font-weight="500" x="410" y="426">QueryValidator</text><text fill="#5b6169" font-size="19" font-weight="500" x="410" y="456">FAISS 컬럼 유사도</text><text fill="#5b6169" font-size="19" font-weight="500" x="410" y="486">스키마 정합성 확인</text><!-- Card 3: 조합 (Build) --><rect fill="#efe1d4" height="230" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="244" x="668" y="300" /><text fill="#121316" font-size="30" font-weight="800" x="694" y="346">조합 (Build)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="694" x2="886" y1="362" y2="362" /><text fill="#5b6169" font-size="19" font-weight="500" x="694" y="396">QuerySpec JSON</text><text fill="#5b6169" font-size="19" font-weight="500" x="694" y="426">OrmQueryBuilder</text><text fill="#5b6169" font-size="19" font-weight="500" x="694" y="456">파라미터화 SQL 생성</text><text fill="#5b6169" font-size="19" font-weight="500" x="694" y="486">18개 few-shot 예시</text><!-- Card 4: 실행 (Execute) --><rect fill="#fffdfa" height="230" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="244" x="952" y="300" /><text fill="#121316" font-size="30" font-weight="800" x="978" y="346">실행 (Execute)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="978" x2="1170" y1="362" y2="362" /><text fill="#5b6169" font-size="19" font-weight="500" x="978" y="396">SqlDataSource</text><text fill="#5b6169" font-size="19" font-weight="500" x="978" y="426">PostgreSQL 11 테이블</text><text fill="#5b6169" font-size="19" font-weight="500" x="978" y="456">FCE/ROLL/QTB/SPL</text><text fill="#5b6169" font-size="19" font-weight="500" x="978" y="486">MockDataSource 폴백</text><!-- Card 5: 정리 (Format) --><rect fill="#efe1d4" height="230" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="244" x="1236" y="300" /><text fill="#121316" font-size="30" font-weight="800" x="1262" y="346">정리 (Format)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="1262" x2="1454" y1="362" y2="362" /><text fill="#5b6169" font-size="19" font-weight="500" x="1262" y="396">ResponseFormatter</text><text fill="#5b6169" font-size="19" font-weight="500" x="1262" y="426">한국어 텍스트 응답</text><text fill="#5b6169" font-size="19" font-weight="500" x="1262" y="456">단위 · 시간 포맷</text><text fill="#5b6169" font-size="19" font-weight="500" x="1262" y="486">근거 데이터 첨부</text><!-- Arrows between cards (40px gaps) --><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="344" x2="384" y1="415" y2="415" /><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="628" x2="668" y1="415" y2="415" /><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="912" x2="952" y1="415" y2="415" /><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="1196" x2="1236" y1="415" y2="415" /><!-- Input/Output labels --><text fill="#bb5a21" font-size="18" font-weight="800" text-anchor="end" x="90" y="310">자연어 질의 입력</text><text fill="#bb5a21" font-size="18" font-weight="800" x="1490" y="310">한국어 응답 출력</text><!-- Tag pills --><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="282" x="92" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="110" y="789">LLMParser + KeywordParser</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="202" x="386" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="404" y="789">컬럼 화이트리스트</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="182" x="600" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="618" y="789">OrmQueryBuilder</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="232" x="794" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="812" y="789">PostgreSQL 11 테이블</text></svg>
