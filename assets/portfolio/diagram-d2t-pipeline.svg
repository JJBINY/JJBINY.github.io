<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="960" style="font-family:Noto Sans KR, Apple SD Gothic Neo, sans-serif;" version="1.1" viewBox="0 0 1600 960" width="1600" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><marker id="arrow" markerWidth="10" markerHeight="10" orient="auto" refX="10" refY="5" markerUnits="userSpaceOnUse"><polyline points="0,1 9,5 0,9" fill="none" stroke="#bb5a21" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" /></marker></defs><rect fill="#fbf7f0" height="100%" width="100%" x="0" y="0" /><rect fill="#fffdfa" height="852" rx="34" ry="34" stroke="#d9cfbf" stroke-width="2" width="1492" x="54" y="52" /><!-- Title area --><text fill="#bb5a21" font-size="22" font-weight="800" x="94" y="104">핵심 구조</text><text fill="#121316" font-size="46" font-weight="800" x="94" y="156">Structure-Aware D2T</text><text fill="#5b6169" font-size="21" font-weight="500" x="94" y="202">PDF 문서를 4단계로 처리해 구조 인식 텍스트를 생성하는 파이프라인</text><!-- Card 1: 파싱 (Parse) --><rect fill="#efe1d4" height="260" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="268" x="126" y="280" /><text fill="#121316" font-size="30" font-weight="800" x="152" y="326">파싱 (Parse)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="152" x2="368" y1="342" y2="342" /><text fill="#bb5a21" font-size="16" font-weight="800" x="152" y="370">Step 1</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="402">Docling Parser</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="432">페이지·피규어 분리</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="462">이미지·표 추출</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="492">문서 구조 보존</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="522">PDF → Pages +</text><text fill="#5b6169" font-size="21" font-weight="500" x="152" y="546">Figures</text><!-- Card 2: 인식 (OCR) --><rect fill="#fffdfa" height="260" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="268" x="440" y="280" /><text fill="#121316" font-size="30" font-weight="800" x="466" y="326">인식 (OCR)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="466" x2="682" y1="342" y2="342" /><text fill="#bb5a21" font-size="16" font-weight="800" x="466" y="370">Step 2</text><text fill="#5b6169" font-size="21" font-weight="500" x="466" y="402">Deepseek OCR2</text><text fill="#5b6169" font-size="21" font-weight="500" x="466" y="432">텍스트·표 구조 인식</text><text fill="#5b6169" font-size="21" font-weight="500" x="466" y="462">좌표·레이아웃 보존</text><text fill="#5b6169" font-size="21" font-weight="500" x="466" y="492">이미지 → 텍스트</text><text fill="#5b6169" font-size="21" font-weight="500" x="466" y="522">표 → 구조화 데이터</text><!-- Card 3: 구조화 (Structure) --><rect fill="#efe1d4" height="260" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="268" x="754" y="280" /><text fill="#121316" font-size="30" font-weight="800" x="780" y="326">구조화 (Structure)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="780" x2="996" y1="342" y2="342" /><text fill="#bb5a21" font-size="16" font-weight="800" x="780" y="370">Step 3</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="402">Markdown 변환</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="432">연관 컨텍스트 보존</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="462">앞·뒤 페이지</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="492">문맥 연결</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="522">피규어 간</text><text fill="#5b6169" font-size="21" font-weight="500" x="780" y="546">관계 정보 보존</text><!-- Card 4: 생성 (Generate) --><rect fill="#fffdfa" height="260" rx="26" ry="26" stroke="#d9cfbf" stroke-width="2.2" width="268" x="1068" y="280" /><text fill="#121316" font-size="30" font-weight="800" x="1094" y="326">생성 (Generate)</text><line stroke="#d9cfbf" stroke-width="1.6" x1="1094" x2="1310" y1="342" y2="342" /><text fill="#bb5a21" font-size="16" font-weight="800" x="1094" y="370">Step 4</text><text fill="#5b6169" font-size="21" font-weight="500" x="1094" y="402">LLM 기반 생성</text><text fill="#5b6169" font-size="21" font-weight="500" x="1094" y="432">YAML Frontmatter</text><text fill="#5b6169" font-size="21" font-weight="500" x="1094" y="462">메타데이터·키워드</text><text fill="#5b6169" font-size="21" font-weight="500" x="1094" y="492">구조 정보·요약</text><text fill="#5b6169" font-size="21" font-weight="500" x="1094" y="522">신뢰도 점수 포함</text><!-- Arrows between cards --><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="394" x2="440" y1="410" y2="410" /><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="708" x2="754" y1="410" y2="410" /><line marker-end="url(#arrow)" stroke="#bb5a21" stroke-width="3" x1="1022" x2="1068" y1="410" y2="410" /><!-- Input label (left) --><text fill="#bb5a21" font-size="18" font-weight="800" text-anchor="end" x="116" y="290">PDF 문서 입력</text><!-- Output label (right) --><text fill="#bb5a21" font-size="18" font-weight="800" x="1346" y="290">Structure-Aware</text><text fill="#bb5a21" font-size="18" font-weight="800" x="1346" y="314">Text 출력</text><!-- Bottom connection bar: 3계층 인덱싱 연결 --><rect fill="#f4ece2" height="96" rx="20" ry="20" stroke="#d9cfbf" stroke-width="2" width="1210" x="195" y="600" /><text fill="#121316" font-size="24" font-weight="800" x="225" y="638">3계층 인덱싱 연결</text><text fill="#5b6169" font-size="18" font-weight="500" x="225" y="670">D2T 결과를 Element 계층에 적재 → Chunk로 묶어 Document-Chunk-Element 구조로 검색</text><!-- Arrows from cards down to connection bar --><polyline fill="none" marker-end="url(#arrow)" points="260,540 260,570 800,570 800,600" stroke="#bb5a21" stroke-width="3" /><polyline fill="none" marker-end="url(#arrow)" points="574,540 574,570 800,570 800,600" stroke="#bb5a21" stroke-width="3" /><polyline fill="none" marker-end="url(#arrow)" points="888,540 888,570 800,570 800,600" stroke="#bb5a21" stroke-width="3" /><polyline fill="none" marker-end="url(#arrow)" points="1202,540 1202,570 800,570 800,600" stroke="#bb5a21" stroke-width="3" /><!-- Tag pills at bottom --><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="172" x="92" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="110" y="789">Docling Parser</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="192" x="276" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="294" y="789">Deepseek OCR2</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="132" x="480" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="498" y="789">Markdown</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="82" x="624" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="642" y="789">LLM</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="212" x="718" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="736" y="789">YAML Frontmatter</text><rect fill="#f4ece2" height="44" rx="22" ry="22" stroke="#d9cfbf" stroke-width="1.8" width="182" x="942" y="760" /><text fill="#121316" font-size="18" font-weight="700" x="960" y="789">컨텍스트 보존</text></svg>
